<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria Quiz</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>

    <div class="container" >

        <div id="start-page">
            <p id="high-score">Highscore: <span id="highscore">0</span>/10</p>
            <h1>Nigeria Quiz </h1>
            <h2>How will do you know you country? </h2>
            <br>
            <input id="username" type="text" placeholder="What is your name?">
            <button id="start-btn">Start Quiz</button>

        </div>

        <div id="quiz-screen" class="hidden">
            <p id="welcome-msg"></p>
            <div id="header" >
                <p>Questions: <span id="question-number">0</span>/10</p>
                <p id="time-left">Time left:<span id="timer">30</span>s</p>
            </div>
            
            <h2 id="question"></h2>
            <div id="option-btn">        </div>
            <button id="next-btn">Next</button>
        </div>

        <div id="restart-screen" class="hidden">
            <h2>Congratulation</h2>
            <p>Your Score: <span id="score">0</span>/10</p>
            <br>
            <button id="restart-btn">Try again</button>
            <p id="result-msg"></p>
        </div>

    </div>
    
    <script src = "script.js"></script>
</body>
</html>
